<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>KiCad Toolkit Minimal Board</title>
        <link rel="stylesheet" href="./styles.css" />
    </head>
    <body>
        <main>
            <header>
                <h1>KiCad Toolkit</h1>
                <div class="view-controls" aria-label="Board side">

            <section id="board" aria-label="Rendered PCB"></section>
        </main>
        <script type="module" src="./example.mjs"></script>
    </body>
