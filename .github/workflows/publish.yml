name: Publish

on:
    release:
        types:
            - published
    workflow_dispatch:

permissions:
    contents: read
    id-token: write

jobs:
    publish:
        name: Publish to npm
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  registry-url: https://registry.npmjs.org
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Check formatting
              run: npm run check:format

            - name: Test
              run: npm test

            - name: Publish
              run: npm publish --provenance
